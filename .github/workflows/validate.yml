name: Validate Examples

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Validate hello_world
      run: |
        python tools/validate_module.py examples/hello_world
    
    - name: Run hello_world tests
      run: |
        cd examples/hello_world
        python tests/smoke.py
    
    - name: Validate user_service
      run: |
        python tools/validate_module.py examples/user_service
    
    - name: Run user_service tests
      run: |
        cd examples/user_service
        python tests/smoke.py
    
    - name: Check repository structure
      run: |
        test -f HARNESS_SPEC.md
        test -f AI_CHECKLIST.md
        test -f AI_REPAIR_GUIDE.md
        test -f README.md
        test -f LICENSE

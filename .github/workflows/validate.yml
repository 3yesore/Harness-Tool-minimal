name: Validate Harness Tool

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile scripts
        run: python -m py_compile tools/init_module.py tools/apply_harness.py tools/validate_module.py .openclaw_skill/scripts/init_harness_module.py .openclaw_skill/scripts/apply_harness.py .openclaw_skill/scripts/validate_harness.py

      - name: Validate reference example
        run: python tools/validate_module.py examples/hello_world --strict --profile python-service

      - name: Validate skill packaging
        run: python .openclaw_skill/scripts/validate_harness.py examples/hello_world --strict --profile python-service
